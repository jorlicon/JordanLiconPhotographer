<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" role="img" aria-labelledby="title desc">
  <title id="title">Architectural and interior photography service visual</title>
  <desc id="desc">Modern architectural interior with glass, desert-toned materials, and cinematic light.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
