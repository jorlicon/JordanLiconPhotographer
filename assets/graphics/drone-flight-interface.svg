  <circle cx="810" cy="470" r="156" fill="none" stroke="#7fd7d7" stroke-opacity=".2"/>
  <path d="M810 470 L596 231 A322 322 0 0 1 1075 310 Z" fill="#7fd7d7" opacity=".16"/>
  <path d="M246 625 434 310 672 386 914 184 1310 594 1118 808 704 720 312 846Z" fill="none" stroke="#92d48f" stroke-opacity=".58" stroke-width="3" stroke-dasharray="12 16"/>
  <g fill="#92d48f">
