    <rect x="-36" y="-36" width="72" height="72" transform="rotate(45)" fill="#111615" stroke="url(#gold)" stroke-width="3"/>
    <rect x="-156" y="-4" width="312" height="8" fill="#f0ebe2" fill-opacity=".16" stroke="#f0ebe2" stroke-opacity=".56"/>
    <rect x="-156" y="-4" width="312" height="8" transform="rotate(90)" fill="#f0ebe2" fill-opacity=".16" stroke="#f0ebe2" stroke-opacity=".56"/>
    <g fill="#111615" stroke="#7fd7d7" stroke-width="3">
      <circle cx="-156" cy="-156" r="42"/><circle cx="156" cy="-156" r="42"/><circle cx="-156" cy="156" r="42"/><circle cx="156" cy="156" r="42"/>
    </g>
