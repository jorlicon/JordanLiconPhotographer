<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Drone flight interface graphic</title>
  <desc id="desc">Abstract technological drone flight interface with radar, route pins, telemetry, and mapping grid.</desc>
  <defs>
    <radialGradient id="glow" cx="68%" cy="22%" r="70%">
      <stop offset="0" stop-color="#7fd7d7" stop-opacity=".26"/>
      <stop offset=".42" stop-color="#0d1010" stop-opacity=".78"/>
      <stop offset="1" stop-color="#050607"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f0d89c"/>
      <stop offset="1" stop-color="#b8985f"/>
    </linearGradient>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#7fd7d7" stroke-opacity=".13" stroke-width="1"/>
    </pattern>
    <filter id="soft">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#glow)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>
  <rect x="82" y="76" width="1436" height="848" fill="none" stroke="#7fd7d7" stroke-opacity=".24"/>
